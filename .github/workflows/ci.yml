name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip  # --group needs pip >= 25.1
          pip install . --group dev
      - name: Lint
        run: |
          ruff check .
          ruff format --check .
      - name: Test
        run: pytest -q
