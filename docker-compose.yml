# License: placeholder — headers finalized in Phase 8 (see DECISIONS.md).
services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      # The app connects as the SELECT-only role; only init scripts run as the owner.
      DATABASE_URL: postgresql://fondaco_ro:fondaco-ro-dev@db:5432/fondaco
      # Planner: defaults to Ollama on the docker host; override in .env for a cloud API.
      FONDACO_LLM_BASE_URL: ${FONDACO_LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      FONDACO_LLM_API_KEY: ${FONDACO_LLM_API_KEY:-}
      FONDACO_LLM_MODEL: ${FONDACO_LLM_MODEL:-qwen2.5-coder:7b}
      FONDACO_LLM_TIMEOUT_S: ${FONDACO_LLM_TIMEOUT_S:-180}
      FONDACO_EGRESS_CLEARANCE: ${FONDACO_EGRESS_CLEARANCE:-internal}
      FONDACO_AUDIT_LOG: /data/audit.jsonl
    volumes:
      - audit_data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: fondaco
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fondaco-dev}
      POSTGRES_DB: fondaco
    volumes:
      - ./demo/dataset/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fondaco -d fondaco"]
      interval: 5s
      timeout: 3s
      retries: 10
    # No published port: the database is intentionally reachable only from
    # inside the compose network. Demo data loader added in Phase 2.

volumes:
  audit_data:
