# License: placeholder — headers finalized in Phase 8 (see DECISIONS.md).
services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://fondaco:${POSTGRES_PASSWORD:-fondaco-dev}@db:5432/fondaco
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: fondaco
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fondaco-dev}
      POSTGRES_DB: fondaco
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fondaco -d fondaco"]
      interval: 5s
      timeout: 3s
      retries: 10
    # No published port: the database is intentionally reachable only from
    # inside the compose network. Demo data loader added in Phase 2.
